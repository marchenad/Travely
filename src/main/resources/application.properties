# Configuración básica
spring.application.name=travely
server.port=8080

# PostgreSQL
# Nota: Si el backend está en el mismo servidor que la BD, puedes usar 'localhost' en lugar de la IP.
spring.datasource.url=jdbc:postgresql://100.102.137.92:5432/Travely
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Jackson
spring.jackson.time-zone=UTC
spring.jackson.default-property-inclusion=non_null

# CORS (CORREGIDO: Ahora permite el frontend seguro bajo HTTPS)
# Se ha sustituido la IP por el dominio de Cloudflare para evitar bloqueos de seguridad.
cors.allowed-origins=http://localhost:4200,https://travely.devdyd.com

# JWT
jwt.secret=travely-super-secret-jwt-signing-key-256bits-minimum
jwt.expiration=86400000