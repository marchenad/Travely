spring.application.name=travely
server.port=8080

# PostgreSQL
spring.datasource.url=jdbc:postgresql://100.102.137.92:5432/Travely
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Jackson 3.x — write-dates-as-timestamps ya no existe (ISO-8601 es el default en Jackson 3.x)
spring.jackson.time-zone=UTC
spring.jackson.default-property-inclusion=non_null

# CORS — orígenes permitidos (separados por coma)
cors.allowed-origins=http://localhost:4200,http://localhost:3000

# JWT
jwt.secret=travely-super-secret-jwt-signing-key-256bits-minimum
jwt.expiration=86400000
